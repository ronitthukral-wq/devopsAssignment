trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  svcConnection: 'firstserviceconnection'
  backendRG: 'rg-firstresource'
  backendStorage: 'storagergfirst13'
  appName: 'app-devops-assignment'

stages:

# STAGE 1: Infrastructure via Terraform
- stage: TF_Pipeline
  displayName: '1. TF Pipeline Stage'
  jobs:
  - job: Deploy_Infra
    steps:
    - task: TerraformInstaller@1
      displayName: 'Install Terraform'
      inputs:
        terraformVersion: 'latest'

    - task: AzureCLI@2
      displayName: 'TF Init + Plan + Apply'
      inputs:
        azureSubscription: '$(svcConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        addSpnToEnvironment: true
        inlineScript: |
          cd $(System.DefaultWorkingDirectory)/terraform

          export ARM_CLIENT_ID=$servicePrincipalId
          export ARM_CLIENT_SECRET=$servicePrincipalKey
          export ARM_TENANT_ID=$tenantId
          export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

          terraform init \
            -backend-config="resource_group_name=$(backendRG)" \
            -backend-config="storage_account_name=$(backendStorage)" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=unified.terraform.tfstate"

          terraform plan -out=tfplan

          terraform apply -auto-approve tfplan

# STAGE 2: Build Application Code
- stage: Build_Pipeline
  displayName: '2. Build Pipeline Stage'
  dependsOn: TF_Pipeline
  jobs:
  - job: Compile_Code
    steps:
    - script: |
        mkdir -p $(System.DefaultWorkingDirectory)/out
        cp $(System.DefaultWorkingDirectory)/src/index.html $(System.DefaultWorkingDirectory)/out/
      displayName: 'Staging Code Artifacts'

    - task: ArchiveFiles@2
      displayName: 'Zip Artifacts'
      inputs:
        rootFolderOrFile: '$(System.DefaultWorkingDirectory)/out'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/app.zip'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish Artifacts'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/app.zip'
        ArtifactName: 'drop'
        publishLocation: 'Container'

# STAGE 3: Release Application onto Infrastructure
- stage: Release_Pipeline
  displayName: '3. Release Pipeline Stage'
  dependsOn: Build_Pipeline
  jobs:
  - deployment: Deploy_App
    environment: 'Practice'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadBuildArtifacts@1
            displayName: 'Download Artifacts'
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'drop'
              downloadPath: '$(System.ArtifactsDirectory)'

          - task: AzureFunctionApp@2
            displayName: 'Deploy Function App'
            inputs:
              connectedServiceNameARM: '$(svcConnection)'
              appType: 'functionAppLinux'
              appName: '$(appName)'
              package: '$(System.ArtifactsDirectory)/drop/app.zip'
              runtimeStack: 'NODE|18'