<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps Assignment</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #1a1a2e;
      border: 1px solid #e94560;
      border-radius: 12px;
      padding: 40px 60px;
      text-align: center;
    }
    h1 { color: #e94560; }
    p  { color: #aaa; margin-top: 10px; }
    .badge {
      display: inline-block;
      margin-top: 20px;
      background: #e94560;
      padding: 6px 18px;
      border-radius: 20px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚀 DevOps Assignment</h1>
    <p>Azure Function App — Successfully Deployed</p>
    <p>Pipeline: Terraform → Build → Release</p>
    <span class="badge">✅ Live on Azure</span>
  </div>
</body>
</html>
