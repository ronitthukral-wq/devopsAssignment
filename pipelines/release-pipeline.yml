trigger: none

resources:
  pipelines:
  - pipeline: appBuildSource
    source: 'App-Build-Pipeline-Name'  # must match exact name in Azure DevOps portal
    trigger: true

pool:
  vmImage: 'ubuntu-latest'

steps:
- task: DownloadPipelineArtifact@2
  inputs:
    source: 'specific'
    pipeline: appBuildSource
    artifact: 'drop'
    path: '$(System.ArtifactsDirectory)'

- task: AzureFunctionApp@2
  inputs:
    connectedServiceNameARM: 'azure-practice-connection'
    appType: 'functionAppLinux'
    appName: 'app-devops-assignment'
    package: '$(System.ArtifactsDirectory)/app.zip'
    runtimeStack: 'NODE|18'